name: Tests and Coverage

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  schema:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate analysis project schema
        uses: ./.github/actions/validate-analysis-projects
        with:
          root: demo-projects

      - name: Validate demo-project output schema
        uses: ./.github/actions/validate-project-outputs
        with:
          root: demo-projects
          require_project_files: "true"

      - name: Validate test fixture output schema
        uses: ./.github/actions/validate-project-outputs
        with:
          root: tests/fixtures/prebuilt_public_project
          require_project_files: "true"

  unit-test:
    needs: schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install project and unit test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Run pytest with coverage
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          python -m pytest \
                    -m "not e2e" \
                    --ignore=tests/frontend-smoke/ \
                    --code-highlight=yes \
                    --color=yes \
                    --verbosity=3 \
                    -p pytest_cov \
                    --cov=vertex \
                    --cov-report=term-missing \
                    --cov-report=xml

      - name: Upload coverage.xml artifact
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload coverage report to Codecov (best effort)
        continue-on-error: true
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  frontend-smoke-test:
    needs: schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install frontend smoke test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[frontend-smoke-tests]"

      - name: Run frontend smoke tests
        env:
          PLAYWRIGHT_ARTIFACTS_DIR: test-results/playwright
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
        run: |
          python -m pytest \
                    --code-highlight=yes \
                    --color=yes \
                    --verbosity=3 \
                    tests/frontend-smoke/test_playwright_smoke.py

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-artifacts
          path: test-results/playwright
          if-no-files-found: ignore
